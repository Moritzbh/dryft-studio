<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Kunden-Login · BB Brands</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FAFAFB;
  --bg-card: #FFFFFF;
  --primary: #0305C6;
  --primary-dark: #0204A0;
  --accent: #FF21A6;
  --text: #0A0A0A;
  --text-muted: #6B7280;
  --text-light: #9CA3AF;
  --border: rgba(10, 10, 10, 0.08);
  --red: #EF4444;
  --green: #10B981;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-pill: 100px;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at 20% 30%, rgba(3, 5, 198, 0.08), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255, 33, 166, 0.07), transparent 50%),
    var(--bg);
}
.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: 0 20px 60px rgba(3, 5, 198, 0.10);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: var(--primary);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px; font-weight: 800;
  box-shadow: 0 4px 12px rgba(3, 5, 198, 0.25);
}
.eyebrow {
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 28px;
}
.intro {
  font-size: 14px; color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 28px;
}
label {
  display: block;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 16px;
}
label:first-of-type { margin-top: 0; }
input {
  width: 100%; padding: 14px 16px;
  font-family: inherit;
  font-size: 14px; font-weight: 500;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  outline: none;
  transition: all 0.2s;
}
input:focus {
  background: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(3, 5, 198, 0.08);
}
button {
  width: 100%; padding: 14px;
  margin-top: 24px;
  background: var(--primary);
  color: #fff;
  font-family: inherit;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.2px;
  border: none;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 8px 24px rgba(3, 5, 198, 0.25);
}
button:hover { background: var(--accent); box-shadow: 0 12px 32px rgba(255, 33, 166, 0.30); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.error {
  font-size: 13px;
  color: var(--red);
  margin-top: 14px;
  min-height: 18px;
  font-weight: 600;
}
.success {
  font-size: 13px;
  color: var(--green);
  margin-top: 14px;
  min-height: 18px;
  font-weight: 600;
}
.foot {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-light);
}
.foot a { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="brand-mark">BB</span>
    BB Brands
  </div>
  <div class="eyebrow">Kunden-Vorschau</div>
  <p class="intro">Logge dich mit deinem Kunden-Kürzel und Passwort ein, um deine Theme-Vorschau zu sehen.</p>

  <form id="login-form">
    <label for="slug">Kunden-Kürzel</label>
    <input type="text" id="slug" name="slug" placeholder="z.B. bachgold" autocapitalize="none" autocomplete="username" required>

    <label for="password">Passwort</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

    <button type="submit" id="submit-btn">Einloggen</button>
    <div class="error" id="error"></div>
  </form>

  <div class="foot">
    Probleme beim Login? <a href="mailto:info@bb-brands.de">info@bb-brands.de</a>
  </div>
</div>

<script>
(function(){
  const form = document.getElementById('login-form');
  const slugInput = document.getElementById('slug');
  const passwordInput = document.getElementById('password');
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('submit-btn');

  // Auto-redirect wenn schon eingeloggt (Cookie wird automatisch mitgesendet)
  fetch('/api/preview-auth?action=verify', { credentials: 'include' })
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.brand) {
        const params = new URLSearchParams(location.search);
        const ret = params.get('return');
        if (ret && ret.startsWith('/preview/')) {
          location.href = ret;
        } else {
          location.href = '/preview/' + d.brand.slug + '-' + d.brand.token + '/';
        }
      }
    })
    .catch(() => {});

  // Pre-fill slug if URL has ?slug= or ?return=/preview/{slug}-{token}/...
  const params = new URLSearchParams(location.search);
  const slugFromUrl = params.get('slug');
  if (slugFromUrl) {
    slugInput.value = slugFromUrl;
    passwordInput.focus();
  } else {
    const ret = params.get('return') || '';
    const m = ret.match(/^\/preview\/([a-z0-9-]+?)-[a-z0-9]{4,}\//i);
    if (m) {
      slugInput.value = m[1];
      passwordInput.focus();
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Einloggen…';

    try {
      const res = await fetch('/api/preview-auth', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'login',
          slug: slugInput.value.trim().toLowerCase(),
          password: passwordInput.value,
        }),
      });
      const data = await res.json();

      if (!data.ok) {
        if (data.error === 'too many attempts') {
          const sec = data.retryAfterSec || 60;
          errorEl.textContent = `Zu viele Versuche. Bitte warte ${sec} Sek. und probier es nochmal.`;
        } else {
          errorEl.textContent = data.error === 'wrong slug or password'
            ? 'Falsches Kürzel oder Passwort.'
            : (data.error || 'Login fehlgeschlagen.');
        }
        btn.disabled = false;
        btn.textContent = 'Einloggen';
        passwordInput.focus();
        passwordInput.select();
        return;
      }

      // Auth-Cookie wurde vom Server gesetzt (HttpOnly). Brand-Info nur als Cache.
      localStorage.setItem('bb-preview-brand', JSON.stringify(data.brand));

      // Redirect — return param wins, else dashboard
      const ret = params.get('return');
      if (ret && ret.startsWith('/preview/')) {
        location.href = ret;
      } else {
        location.href = '/preview/' + data.brand.slug + '-' + data.brand.token + '/';
      }
    } catch (err) {
      errorEl.textContent = 'Netzwerkfehler. Bitte erneut versuchen.';
      btn.disabled = false;
      btn.textContent = 'Einloggen';
    }
  });
})();
</script>
</body>
</html>
