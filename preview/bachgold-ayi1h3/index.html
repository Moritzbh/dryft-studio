<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Bachgold · Vorschau-Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FAFAFB;
  --bg-card: #FFFFFF;
  --primary: #0305C6;
  --accent: #FF21A6;
  --text: #0A0A0A;
  --text-muted: #6B7280;
  --text-light: #9CA3AF;
  --border: rgba(10, 10, 10, 0.08);
  --green: #10B981;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-pill: 100px;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
.gate {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  color: var(--text-muted);
}
.app { display: none; }
.app.is-active { display: block; }

.topbar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.topbar-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; color: var(--primary);
}
.topbar-brand-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--primary); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.topbar-actions a {
  font-size: 12px; color: var(--text-muted);
  text-decoration: none; font-weight: 600;
  padding: 8px 14px; border-radius: 999px;
  transition: all .15s ease;
}
.topbar-actions a:hover { background: var(--bg); color: var(--text); }
.btn-logout {
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  padding: 8px 14px; border-radius: 999px;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-muted);
  transition: all .15s ease;
}
.btn-logout:hover { border-color: var(--text-muted); color: var(--text); }

.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 56px 24px 32px;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--primary);
  margin-bottom: 16px;
}
.hero h1 {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 12px;
}
.hero p {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 640px;
}

.cards {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

.card {
  display: block;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-decoration: none;
  color: inherit;
  transition: all .2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle at top right, rgba(3, 5, 198, 0.06), transparent 60%);
  pointer-events: none;
}
.card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 16px 40px rgba(3, 5, 198, 0.10);
}
.card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 18px; font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.card-meta {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.card-cta {
  margin-top: 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  display: inline-flex; align-items: center; gap: 6px;
}
.card-cta::after { content: '→'; transition: transform .15s ease; }
.card:hover .card-cta::after { transform: translateX(3px); }

.empty {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.empty-emoji { font-size: 48px; margin-bottom: 16px; }

.spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid rgba(0,0,0,.1);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div style="text-align: center;">
    <div class="spinner"></div>
    <p style="margin-top: 16px; font-size: 13px;">Lade Vorschau…</p>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <span class="topbar-brand-mark">BB</span>
        <span>BB Brands · Vorschau</span>
      </div>
      <div class="topbar-actions">
        <a href="mailto:info@bb-brands.de">Kontakt</a>
        <button class="btn-logout" id="btn-logout">Abmelden</button>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Vorschau-Dashboard</div>
    <h1 id="brand-name">Bachgold</h1>
    <p>Hier siehst du alle Vorschauen, die wir für dich vorbereitet haben. Klick auf eine Karte, um die Vorschau zu öffnen — inklusive Erklärungen zu jeder Section.</p>
  </div>

  <div class="cards" id="cards"></div>
</div>

<script>
const BRAND_SLUG = "bachgold";
const BRAND_TOKEN = "ayi1h3";
const PAGE_LABELS = {
  homepage: { icon: '🏠', label: 'Homepage', sub: 'Startseite mit Hero, Reviews, Bundle-Finder' },
  pdp: { icon: '📦', label: 'Produktseite', sub: 'PDP mit ATC, Trust, FAQ' },
};

(function(){
  const token = localStorage.getItem('bb-preview-token');
  if (!token) {
    location.href = '/preview/login?return=' + encodeURIComponent(location.pathname);
    return;
  }

  fetch('/api/preview-auth?action=verify', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.json())
    .then(d => {
      if (!d.ok || !d.brand || d.brand.slug !== BRAND_SLUG) {
        localStorage.removeItem('bb-preview-token');
        location.href = '/preview/login?return=' + encodeURIComponent(location.pathname);
        return;
      }
      renderApp(d.brand);
    })
    .catch(() => {
      location.href = '/preview/login?return=' + encodeURIComponent(location.pathname);
    });

  function renderApp(brand) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('is-active');
    document.getElementById('brand-name').textContent = brand.name;
    localStorage.setItem('bb-preview-brand', JSON.stringify(brand));

    const cardsEl = document.getElementById('cards');
    const pages = brand.pages || [];

    if (!pages.length) {
      cardsEl.innerHTML = '<div class="empty"><div class="empty-emoji">🛠️</div><p>Wir bereiten gerade deine Vorschauen vor. Schau gleich nochmal rein.</p></div>';
      return;
    }

    pages.sort((a, b) => (b.deployed_at || '').localeCompare(a.deployed_at || ''));
    cardsEl.innerHTML = pages.map(p => {
      const meta = PAGE_LABELS[p.key] || { icon: '📄', label: p.label || p.key, sub: '' };
      const deployed = p.deployed_at ? new Date(p.deployed_at).toLocaleString('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      }) : '';
      const url = '/preview/' + brand.slug + '-' + brand.token + '/' + p.key;
      return `
        <a class="card" href="${url}">
          <div class="card-icon">${meta.icon}</div>
          <div class="card-title">${meta.label}</div>
          <div class="card-meta">${meta.sub || ''}${deployed ? ' · aktualisiert ' + deployed : ''}</div>
          <div class="card-cta">Vorschau öffnen</div>
        </a>
      `;
    }).join('');
  }

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('bb-preview-token');
    localStorage.removeItem('bb-preview-brand');
    location.href = '/preview/login';
  });
})();
</script>

</body>
</html>
